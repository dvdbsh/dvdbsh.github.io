<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Starbucks Dates</title>
    <link rel="shortcut icon" type="image/png" href="https://res.cloudinary.com/di8j84ent/image/upload/v1689886612/icon_ejcwrp.png"/>
    <link rel="apple-touch-icon" type="image/png" href="https://res.cloudinary.com/di8j84ent/image/upload/v1689886612/icon_ejcwrp.png"/>
    <style>
        /* Font Definitions */
        @font-face {
            font-family: 'SoDo Sans';
            src: url('https://dvdbsh.github.io/sbux/fonts/Sodo%20Sans/SoDoSans-Regular.otf') format('opentype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'SoDo Sans';
            src: url('https://dvdbsh.github.io/sbux/fonts/Sodo%20Sans/SoDoSans-SemiBold.otf') format('opentype');
            font-weight: 600;
        }
        @font-face {
            font-family: 'Lander Grande';
            src: url('https://dvdbsh.github.io/sbux/fonts/Lander/LanderGrande-Regular.otf') format('opentype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Pike';
            src: url('https://dvdbsh.github.io/sbux/fonts/Pike/Pike-Bold.otf') format('opentype');
            font-weight: 700;
        }

        :root {
            --sb-dark: #1e3932;
            --sb-light: #d4e9e2;
            --white: #ffffff;
            --sb-accent: #00704a;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'SoDo Sans', -apple-system, sans-serif;
            background-color: var(--sb-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100svh; 
            color: var(--white);
            padding: 10px;
            overflow: hidden;
        }

        #main {
            width: 100%;
            max-width: 400px;
            max-height: 96svh;
            background-color: var(--sb-dark);
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #header {
            padding: 4svh 25px 2svh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        #greeting {
            font-family: 'Pike', sans-serif;
            font-size: clamp(32px, 5.5svh, 42px);
            font-weight: 700;
            margin-bottom: 2px;
            letter-spacing: -0.8px;
            line-height: 1.1;
        }

        #today {
            font-family: 'Lander Grande', serif;
            font-size: clamp(14px, 2.2svh, 16px);
            font-weight: 400;
            opacity: 0.9;
            letter-spacing: 0.2px;
            color: var(--sb-light);
        }

        #emoji {
            font-size: clamp(40px, 8svh, 54px);
            line-height: 1;
            margin-left: 15px;
        }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 0 25px;
            flex-shrink: 0;
        }

        #list-container {
            padding: 10px 25px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            flex-grow: 1;
            overflow: hidden;
        }

        .section-label {
            font-size: 10px;
            font-weight: 600;
            color: rgba(212, 233, 226, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 8px 0 4px;
            flex-shrink: 0;
        }

        .date-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(5px, 1.1svh, 12px) 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .date-row:last-child {
            border-bottom: none;
        }

        .label {
            font-weight: 600;
            font-size: clamp(12px, 1.8svh, 14px);
            color: var(--sb-light);
        }

        .value {
            font-weight: 400;
            font-size: clamp(12px, 1.8svh, 15px);
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        @media (max-width: 400px) {
            body { padding: 0; }
            #main { 
                border-radius: 0; 
                max-height: 100svh; 
                height: 100svh; 
            }
        }
    </style>
</head>
<body>

    <div id="main">
        <div id="header">
            <div class="header-text">
                <div id="greeting"></div>
                <div id="today"></div>
            </div>
            <span id="emoji"></span>
        </div>
        
        <div class="divider"></div>

        <div id="list-container">
            <div class="section-label">Hourly</div>
            <div class="date-row"><span class="label">12 Hours</span><span class="value" id="hrs12"></span></div>
            <div class="date-row"><span class="label">24 Hours</span><span class="value" id="hrs24"></span></div>
            <div class="date-row"><span class="label">48 Hours</span><span class="value" id="hrs48"></span></div>
            <div class="date-row"><span class="label">72 Hours</span><span class="value" id="hrs72"></span></div>
            
            <div class="section-label">Daily</div>
            <div class="date-row"><span class="label">2 Days</span><span class="value" id="days2"></span></div>
            <div class="date-row"><span class="label">3 Days</span><span class="value" id="days3"></span></div>
            <div class="date-row"><span class="label">5 Days</span><span class="value" id="days5"></span></div>
            <div class="date-row"><span class="label">7 Days</span><span class="value" id="days7"></span></div>
            <div class="date-row"><span class="label">14 Days</span><span class="value" id="days14"></span></div>
            <div class="date-row"><span class="label">30 Days</span><span class="value" id="days30"></span></div>
        </div>
    </div>

    <script>
        const daysShort = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        Date.prototype.addHours = function(h) {
            return new Date(this.getTime() + (h * 60 * 60 * 1000));
        }

        Date.prototype.addDays = function(d) {
            return new Date(this.getTime() + (d * 24 * 60 * 60 * 1000));
        }

        function formatWithMinutes(date) {
            let hours = date.getHours();
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'pm' : 'am';
            hours = hours % 12 || 12;
            return `${daysShort[date.getDay()]}, ${months[date.getMonth()]} ${date.getDate()} at ${hours}:${minutes}${ampm}`;
        }

        function formatDateOnly(date) {
            return `${daysShort[date.getDay()]}, ${months[date.getMonth()]} ${date.getDate()}`;
        }

        function renderToday() {
            const now = new Date();
            const h = now.getHours();
            
            let emoji, greet;
            if (h >= 4 && h < 12) { emoji = "☀️"; greet = "Good Morning"; }
            else if (h >= 12 && h < 17) { emoji = "☕️"; greet = "Good Afternoon"; }
            else if (h >= 17 && h < 22) { emoji = "🌙"; greet = "Good Evening"; }
            else { emoji = "😴"; greet = "Night Owl"; }

            document.getElementById("emoji").textContent = emoji;
            document.getElementById("greeting").textContent = greet;

            const daysLong = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const monthsLong = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            document.getElementById("today").textContent = `${daysLong[now.getDay()]}, ${monthsLong[now.getMonth()]} ${now.getDate()}`;

            [12, 24, 48, 72].forEach(num => {
                const el = document.getElementById(`hrs${num}`);
                if(el) el.textContent = formatWithMinutes(now.addHours(num));
            });

            [2, 3, 5, 7, 14, 30].forEach(num => {
                const el = document.getElementById(`days${num}`);
                if(el) el.textContent = formatDateOnly(now.addDays(num));
            });
        }

        window.onload = renderToday;
    </script>
</body>
</html>
