<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Editor</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @font-face {
            font-family: 'Lander Grande';
            src: url('https://dvdbsh.github.io/sbux/fonts/Lander/LanderGrande-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Lander Grande';
            src: url('https://dvdbsh.github.io/sbux/fonts/Lander/LanderGrande-Bold.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
        }
        @font-face {
            font-family: 'Lander Grande';
            src: url('https://dvdbsh.github.io/sbux/fonts/Lander/LanderGrande-Italic.otf') format('opentype');
            font-weight: normal;
            font-style: italic;
        }
        @font-face {
            font-family: 'Lander Tall';
            src: url('https://dvdbsh.github.io/sbux/fonts/Lander/LanderTall-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Lander Tall';
            src: url('https://dvdbsh.github.io/sbux/fonts/Lander/LanderTall-Bold.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
        }
        @font-face {
            font-family: 'Lander Tall';
            src: url('https://dvdbsh.github.io/sbux/fonts/Lander/LanderTall-Italic.otf') format('opentype');
            font-weight: normal;
            font-style: italic;
        }
        @font-face {
            font-family: 'Pike';
            src: url('https://dvdbsh.github.io/sbux/fonts/Pike/Pike-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Pike';
            src: url('https://dvdbsh.github.io/sbux/fonts/Pike/Pike-Bold.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
        }
        @font-face {
            font-family: 'Sodo Sans';
            src: url('https://dvdbsh.github.io/sbux/fonts/Sodo Sans/SoDoSans-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Sodo Sans';
            src: url('https://dvdbsh.github.io/sbux/fonts/Sodo Sans/SoDoSans-Bold.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
        }
        @font-face {
            font-family: 'Sodo Sans';
            src: url('https://dvdbsh.github.io/sbux/fonts/Sodo Sans/SoDoSans-Italic.otf') format('opentype');
            font-weight: normal;
            font-style: italic;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: white;
            border-bottom: 1px solid #ddd;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .title-input {
            font-size: 20px;
            font-weight: 500;
            border: none;
            background: transparent;
            outline: none;
            flex: 1;
            padding: 4px 0;
        }

        .toolbar {
            background: white;
            border-bottom: 1px solid #ddd;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        select, button {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 32px;
        }

        button {
            width: 32px;
            padding: 0;
            color: #666;
        }

        button:hover {
            background: #f0f0f0;
            border-color: #999;
        }

        button.active {
            background: #333;
            color: white;
            border-color: #333;
        }

        select {
            min-width: 120px;
            padding: 6px 10px;
            width: auto;
        }

        .separator {
            width: 1px;
            height: 20px;
            background: #ddd;
        }

        .color-input {
            width: 32px;
            height: 32px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            padding: 2px;
        }

        .editor-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .canvas {
            flex: 1;
            background: #f5f5f5;
            overflow: auto;
            padding: 40px;
        }

        .page {
            width: 8.5in;
            height: 11in;
            background: white;
            margin: 0 auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 0.5in;
            position: relative;
            outline: 1px solid #ddd;
        }

        .text-editor {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            font-size: 16px;
            font-family: 'Lander Grande', serif;
            line-height: 1.6;
            resize: none;
            padding: 0;
            color: #000000;
            overflow: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .text-editor:focus {
            outline: none;
        }

        .text-editor[contenteditable]:focus {
            outline: none;
        }

        .status-bar {
            background: white;
            border-top: 1px solid #ddd;
            padding: 8px 16px;
            font-size: 12px;
            color: #999;
            display: flex;
            justify-content: space-between;
        }

        input[type="file"] {
            display: none;
        }

        .icon {
            width: 18px;
            height: 18px;
        }

        @media print {
            .header, .toolbar, .status-bar {
                display: none !important;
            }
            .canvas {
                background: white;
                padding: 0;
            }
            .page {
                width: 8.5in;
                height: 11in;
                margin: 0;
                box-shadow: none;
                outline: none;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" class="title-input" id="titleInput" placeholder="Untitled Document" value="Untitled Document">
    </div>

    <div class="toolbar">
        <select id="fontFamily" onchange="applyFont()">
            <option value="'Lander Grande', serif">Lander Grande</option>
            <option value="'Lander Tall', serif">Lander Tall</option>
            <option value="'Pike', monospace">Pike</option>
            <option value="'Sodo Sans', sans-serif">Sodo Sans</option>
        </select>

        <select id="fontSize" onchange="applyFontSize()">
            <option value="12">12px</option>
            <option value="14">14px</option>
            <option value="16" selected>16px</option>
            <option value="18">18px</option>
            <option value="20">20px</option>
            <option value="24">24px</option>
            <option value="28">28px</option>
            <option value="32">32px</option>
            <option value="36">36px</option>
            <option value="48">48px</option>
            <option value="72">72px</option>
        </select>

        <div class="separator"></div>

        <button id="boldBtn" onclick="toggleBold()" title="Bold (Ctrl+B)">
            <i class="ph ph-bold"></i>
        </button>
        <button id="italicBtn" onclick="toggleItalic()" title="Italic (Ctrl+I)">
            <i class="ph ph-italic"></i>
        </button>
        <button id="underlineBtn" onclick="toggleUnderline()" title="Underline (Ctrl+U)">
            <i class="ph ph-underline"></i>
        </button>

        <div class="separator"></div>

        <button id="alignLeftBtn" onclick="setAlignment('left')" title="Align Left">
            <i class="ph ph-text-align-left"></i>
        </button>
        <button id="alignCenterBtn" onclick="setAlignment('center')" title="Align Center">
            <i class="ph ph-text-align-center"></i>
        </button>
        <button id="alignRightBtn" onclick="setAlignment('right')" title="Align Right">
            <i class="ph ph-text-align-right"></i>
        </button>
        <button id="alignJustifyBtn" onclick="setAlignment('justify')" title="Justify">
            <i class="ph ph-text-align-justify"></i>
        </button>

        <div class="separator"></div>

        <select id="lineSpacing" onchange="applyLineSpacing()" title="Line Spacing">
            <option value="1">1.0</option>
            <option value="1.15">1.15</option>
            <option value="1.5" selected>1.5</option>
            <option value="2">2.0</option>
            <option value="2.5">2.5</option>
            <option value="3">3.0</option>
        </select>

        <div class="separator"></div>

        <input type="color" class="color-input" id="colorPicker" value="#000000" onchange="applyColor()" title="Text Color">

        <div class="separator"></div>

        <button onclick="saveDocument()" title="Save (Ctrl+S)">
            <i class="ph ph-floppy-disk"></i>
        </button>
        <button onclick="loadDocument()" title="Load">
            <i class="ph ph-folder-open"></i>
        </button>
        <button onclick="window.print()" title="Print (Ctrl+P)">
            <i class="ph ph-printer"></i>
        </button>
    </div>

    <div class="editor-container">
        <div class="editor">
            <div class="canvas">
                <div class="page">
                    <div class="text-editor" id="textEditor" contenteditable="true" placeholder="Start typing..."></div>
                </div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span id="wordCount">0 words</span>
        <span id="charCount">0 characters</span>
    </div>

    <input type="file" id="loadFile" accept=".txt,.json,.html">

    <script>
        const textEditor = document.getElementById('textEditor');
        const titleInput = document.getElementById('titleInput');
        const fontFamily = document.getElementById('fontFamily');
        const fontSize = document.getElementById('fontSize');
        const boldBtn = document.getElementById('boldBtn');
        const italicBtn = document.getElementById('italicBtn');
        const colorPicker = document.getElementById('colorPicker');
        const lineSpacing = document.getElementById('lineSpacing');
        const wordCount = document.getElementById('wordCount');
        const charCount = document.getElementById('charCount');

        let currentAlignment = 'left';
        let currentLineSpacing = '1.5';

        // Auto-save
        textEditor.addEventListener('input', () => {
            localStorage.setItem('editor_content', textEditor.innerHTML);
            updateStats();
        });

        titleInput.addEventListener('change', () => {
            localStorage.setItem('editor_title', titleInput.value);
        });

        fontFamily.addEventListener('change', () => {
            localStorage.setItem('editor_font', fontFamily.value);
        });

        fontSize.addEventListener('change', () => {
            localStorage.setItem('editor_size', fontSize.value);
        });

        lineSpacing.addEventListener('change', () => {
            localStorage.setItem('editor_spacing', lineSpacing.value);
        });

        colorPicker.addEventListener('change', () => {
            localStorage.setItem('editor_color', colorPicker.value);
        });

        function applyFont() {
            const font = fontFamily.value;
            textEditor.style.fontFamily = font;
            
            // Also apply to selected text if there's a selection
            const selection = window.getSelection();
            if (selection.toString().length > 0) {
                const range = selection.getRangeAt(0);
                const span = document.createElement('span');
                span.style.fontFamily = font;
                span.appendChild(range.extractContents());
                range.insertNode(span);
            }
            
            localStorage.setItem('editor_font', font);
            textEditor.focus();
        }

        function applyFontSize() {
            const sizeValue = fontSize.value;
            textEditor.style.fontSize = sizeValue + 'px';
            localStorage.setItem('editor_size', sizeValue);
            textEditor.focus();
        }

        function applyColor() {
            document.execCommand('foreColor', false, colorPicker.value);
            textEditor.focus();
        }

        function toggleBold() {
            document.execCommand('bold', false, null);
            boldBtn.classList.toggle('active');
            textEditor.focus();
        }

        function toggleItalic() {
            document.execCommand('italic', false, null);
            italicBtn.classList.toggle('active');
            textEditor.focus();
        }

        function toggleUnderline() {
            document.execCommand('underline', false, null);
            document.getElementById('underlineBtn').classList.toggle('active');
            textEditor.focus();
        }

        function setAlignment(align) {
            currentAlignment = align;
            textEditor.style.textAlign = align;
            localStorage.setItem('editor_alignment', align);
            updateAlignmentButtons();
            textEditor.focus();
        }

        function applyLineSpacing() {
            const spacing = lineSpacing.value;
            currentLineSpacing = spacing;
            textEditor.style.lineHeight = spacing;
            localStorage.setItem('editor_spacing', spacing);
            textEditor.focus();
        }

        function updateAlignmentButtons() {
            document.getElementById('alignLeftBtn').classList.toggle('active', currentAlignment === 'left');
            document.getElementById('alignCenterBtn').classList.toggle('active', currentAlignment === 'center');
            document.getElementById('alignRightBtn').classList.toggle('active', currentAlignment === 'right');
            document.getElementById('alignJustifyBtn').classList.toggle('active', currentAlignment === 'justify');
        }



        function updateStats() {
            const text = textEditor.innerText;
            const words = text.trim().split(/\s+/).filter(w => w).length;
            const chars = text.length;
            wordCount.textContent = words + ' words';
            charCount.textContent = chars + ' characters';
        }

        function saveDocument() {
            const data = {
                title: titleInput.value,
                content: textEditor.innerHTML,
                font: fontFamily.value,
                size: fontSize.value,
                color: colorPicker.value,
                spacing: lineSpacing.value,
                alignment: currentAlignment
            };
            const link = document.createElement('a');
            link.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(data));
            link.download = (titleInput.value || 'document') + '.json';
            link.click();
        }

        function loadDocument() {
            document.getElementById('loadFile').click();
        }

        document.getElementById('loadFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    titleInput.value = data.title || 'Untitled Document';
                    textEditor.innerHTML = data.content || '';
                    fontFamily.value = data.font || "'Lander Grande', serif";
                    fontSize.value = data.size || '16';
                    colorPicker.value = data.color || '#000000';
                    lineSpacing.value = data.spacing || '1.5';
                    currentAlignment = data.alignment || 'left';
                    applyFontSize();
                    applyLineSpacing();
                    updateAlignmentButtons();
                    updateStats();
                } catch (err) {
                    textEditor.innerText = ev.target.result;
                    updateStats();
                }
            };
            reader.readAsText(file);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveDocument();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                e.preventDefault();
                window.print();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
                e.preventDefault();
                toggleBold();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'i') {
                e.preventDefault();
                toggleItalic();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'u') {
                e.preventDefault();
                toggleUnderline();
            }
        });

        // Load from localStorage
        function loadFromStorage() {
            const saved = localStorage.getItem('editor_content');
            if (saved) textEditor.innerHTML = saved;

            const savedTitle = localStorage.getItem('editor_title');
            if (savedTitle) titleInput.value = savedTitle;

            const savedFont = localStorage.getItem('editor_font');
            if (savedFont) {
                fontFamily.value = savedFont;
                textEditor.style.fontFamily = savedFont;
            } else {
                textEditor.style.fontFamily = "'Lander Grande', serif";
            }

            const savedSize = localStorage.getItem('editor_size');
            if (savedSize) {
                fontSize.value = savedSize;
                textEditor.style.fontSize = savedSize + 'px';
            } else {
                textEditor.style.fontSize = '16px';
            }

            const savedColor = localStorage.getItem('editor_color');
            if (savedColor) colorPicker.value = savedColor;

            const savedSpacing = localStorage.getItem('editor_spacing');
            if (savedSpacing) {
                lineSpacing.value = savedSpacing;
                textEditor.style.lineHeight = savedSpacing;
                currentLineSpacing = savedSpacing;
            } else {
                textEditor.style.lineHeight = '1.5';
                currentLineSpacing = '1.5';
            }

            const savedAlignment = localStorage.getItem('editor_alignment');
            if (savedAlignment) {
                currentAlignment = savedAlignment;
                textEditor.style.textAlign = savedAlignment;
                updateAlignmentButtons();
            } else {
                textEditor.style.textAlign = 'left';
                currentAlignment = 'left';
            }

            textEditor.style.color = '#000000';

            updateStats();
        }

        // Focus on editor
        window.addEventListener('load', () => {
            loadFromStorage();
            textEditor.focus();
            updateAlignmentButtons();
        });
    </script>
</body>
</html>
